<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create new page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>

<body>

    <h2>Create new page</h2>
    <form id="googleForm">
        <label>Google Form ID:</label>
        <input type="text" id="creationFormId" required><br><br>

        <label>ID (Auto-filled, Read-only):</label>
        <input type="text" id="id" readonly required><br><br>

        <label>Title:</label>
        <input type="text" id="title" required><br><br>

        <label>Subtitle:</label>
        <input type="text" id="subtitle"><br><br>

        <div class="editor-container">
            <label>Content:</label>
            <textarea id="content"></textarea><br><br>
        </div>

        <label>Image URL:</label>
        <input type="url" id="image"><br><br>

        <label>Colour:</label>
        <input type="color" id="colour" value="#ffffff"><br><br>

        <label>External Link:</label>
        <input type="url" id="externalLink"><br><br>

        <label>Custom Page:</label>
        <select id="customPage">
            <option value="false">False</option>
            <option value="true">True</option>
        </select><br><br>

        <label>Parent:</label>
        <select id="parent">
            <option value="">Select Parent</option>
        </select><br><br>

        <label>Category:</label>
        <select id="category">
            <option value="category1" selected>Category 1</option>
            <option value="category2">Category 2</option>
            <option value="category3">Category 3</option>
        </select><br><br>



        <button type="submit">Submit</button>
    </form>

    <script type="module" src="./js/create/main.js"></script>
    <script type="module" src="./js/update/main.js"></script>

</body>

</html>
