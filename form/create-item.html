<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Submission</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
</head>

<body>

    <h2>Submit Your Form</h2>
    <form id="googleForm">
        <label>Google Form ID:</label>
        <input type="text" id="formId" required><br><br>

        <label>ID (Auto-filled, Read-only):</label>
        <input type="text" id="id" name="entry.1896761587" readonly required><br><br>

        <label>Title:</label>
        <input type="text" id="title" name="entry.1425210652" required><br><br>

        <label>Subtitle:</label>
        <input type="text" id="subtitle" name="entry.1123697200"><br><br>

        <div class="editor-container">
            <label>Content:</label>
            <textarea id="content" name="entry.421337030"></textarea><br><br>
        </div>

        <label>Image URL:</label>
        <input type="url" id="image" name="entry.377306596"><br><br>

        <label>Colour:</label>
        <input type="color" id="colour" value="#ffffff"><br><br>

        <label>External Link:</label>
        <input type="url" id="externalLink" name="entry.457303743"><br><br>

        <label>Custom Page:</label>
        <select id="customPage" name="entry.2143033031">
            <option value="false">False</option>
            <option value="true">True</option>
        </select><br><br>

        <label>Parent:</label>
        <select id="parent" name="entry.53127251">
            <option value="">Select Parent</option>
        </select><br><br>

        <input type="hidden" id="deleted" name="entry.1153953166">

        <button type="submit">Submit</button>
    </form>

    <script src="scripts.js"></script>
</body>

</html>
