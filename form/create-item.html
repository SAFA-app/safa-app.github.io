<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Submission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    <style>
        .editor-container {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <h2>Submit Your Form</h2>
    <form id="googleForm">
        <label>Google Form ID:</label>
        <input type="text" id="formId" required><br><br>

        <label>ID (Auto-filled, Read-only):</label>
        <input type="text" id="id" name="entry.1896761587" readonly required><br><br>

        <label>Title:</label>
        <input type="text" id="title" name="entry.1425210652" required><br><br>

        <label>Subtitle:</label>
        <input type="text" id="subtitle" name="entry.1123697200"><br><br>

        <div class="editor-container">
            <label>Content:</label>
            <textarea id="content" name="entry.421337030"></textarea><br><br>
        </div>

        <label>Image URL:</label>
        <input type="url" id="image" name="entry.377306596"><br><br>

        <label>Colour:</label>
        <input type="color" id="colour" value="#ffffff"><br><br>

        <label>External Link:</label>
        <input type="url" id="externalLink" name="entry.457303743"><br><br>

        <label>Custom Page:</label>
        <select id="customPage" name="entry.2143033031">
            <option value="false">False</option>
            <option value="true">True</option>
        </select><br><br>

        <label>Parent:</label>
        <select id="parent" name="entry.53127251">
            <option value="">Select Parent</option>
        </select><br><br>

        <input type="hidden" id="deleted" name="entry.1153953166">

        <button type="submit">Submit</button>
    </form>

    <script>
        tinymce.init({
            selector: '#content',
            plugins: 'advlist autolink lists link image charmap preview anchor searchreplace visualblocks code fullscreen insertdatetime media table help',
            toolbar: 'undo redo | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image media table | code preview',
            height: 400,
            branding: false
        });

        function generateId() {
            return 'ID-' + crypto.randomUUID();
        }

        document.getElementById('id').value = generateId();

        document.getElementById('googleForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const formId = document.getElementById('formId').value.trim();

            if (!formId) {
                alert("Please provide a valid Google Form ID.");
                return;
            }

            const formUrl = `https://docs.google.com/forms/d/e/${formId}/formResponse`;

            const formData = new FormData();
            formData.append("entry.1896761587", document.getElementById('id').value);
            formData.append("entry.1425210652", document.getElementById('title').value);
            formData.append("entry.1123697200", document.getElementById('subtitle').value);
            formData.append("entry.421337030", tinymce.get('content').getContent().trim());
            formData.append("entry.377306596", document.getElementById('image').value);
            formData.append("entry.235505769", document.getElementById('colour').value);
            formData.append("entry.457303743", document.getElementById('externalLink').value);
            formData.append("entry.1153953166", ""); // Empty "deleted" field
            formData.append("entry.2143033031", document.getElementById('customPage').value);
            formData.append("entry.53127251", document.getElementById('parent').value);

            fetch(formUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                alert("Form submitted successfully!");
                document.getElementById('googleForm').reset();
                tinymce.get('content').setContent('');
                document.getElementById('id').value = generateId();
            }).catch(error => {
                alert("Error submitting form: " + error);
            });
        });

        const googleSheetsUrl = "https://docs.google.com/spreadsheets/d/1XL-g0mTwrsdM1oTYs4rHNklgjrbSlB_fAJ7YgFGDJxg/gviz/tq?tqx=out:json";

        async function fetchData() {
            try {
                const response = await fetch(googleSheetsUrl);
                const text = await response.text();

                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1];
                const jsonData = JSON.parse(jsonText);

                processParentOptions(jsonData);
            } catch (error) {
                console.error("Error fetching Google Sheets data:", error);
            }
        }

        function processParentOptions(data) {
            const columns = data.table.cols.map(col => col.label);
            const idIndex = columns.indexOf("ID");
            const titleIndex = columns.indexOf("title");
            const deletedIndex = columns.indexOf("deleted");
            const timestampIndex = columns.indexOf("Informazioni cronologiche");

            const idMap = new Map();

            data.table.rows.forEach(row => {
                const cells = row.c;
                const id = cells[idIndex]?.v;
                const title = cells[titleIndex]?.v;
                const deleted = cells[deletedIndex]?.v === "true";
                const timestamp = cells[timestampIndex]?.f;

                if (!id || !title || deleted) return;

                if (!idMap.has(id) || isNewer(timestamp, idMap.get(id).timestamp)) {
                    idMap.set(id, { title, timestamp });
                }
            });

            populateDropdown([...idMap.entries()]);
        }

        function isNewer(newTimestamp, oldTimestamp) {
            return parseTimestamp(newTimestamp) > parseTimestamp(oldTimestamp);
        }

        function parseTimestamp(timestamp) {
            const [date, time] = timestamp.split(" ");
            const [day, month, year] = date.split("/").map(Number);
            const [hours, minutes, seconds] = time.split(".").map(Number);
            return new Date(year, month - 1, day, hours, minutes, seconds).getTime();
        }

        function populateDropdown(idList) {
            const parentSelect = document.getElementById("parent");
            parentSelect.innerHTML = '<option value="">Select Parent</option>';

            idList.forEach(([id, { title }]) => {
                const option = document.createElement("option");
                option.value = id;
                option.textContent = title;
                parentSelect.appendChild(option);
            });
        }

        document.addEventListener("DOMContentLoaded", fetchData);
        document.getElementById("customPage").addEventListener("change", function () {
            const isCustomPage = this.value === "true";

            const fieldsToDisable = [
                "subtitle", "content", "image", "colour", "externalLink"
            ];

            fieldsToDisable.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                if (field) {
                    if (isCustomPage) {
                        field.value = "";
                        field.setAttribute("disabled", "disabled");
                    } else {
                        field.removeAttribute("disabled");
                    }
                }
            });

            const editor = tinymce.get("content");
            if (editor) {
                editor.setContent("");
                editor.mode.set(isCustomPage ? "readonly" : "design");
            }
        });

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("customPage").dispatchEvent(new Event("change"));
        });
    </script>

</body>

</html>
