<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Submission</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    <style>
        .editor-container {
            max-width: 800px;
            /* Adjust width as needed */
            margin: 0 auto;
            /* Centering the editor */
        }
    </style>
</head>

<body>

    <h2>Submit Your Form</h2>
    <form id="googleForm">
        <!-- New field for Form ID -->
        <label>Google Form ID:</label>
        <input type="text" id="formId" required><br><br>

        <label>ID (Auto-filled, Read-only):</label>
        <input type="text" id="id" name="entry.1896761587" readonly required><br><br>

        <label>Title:</label>
        <input type="text" id="title" name="entry.1425210652" required><br><br>

        <label>Subtitle:</label>
        <input type="text" id="subtitle" name="entry.1123697200"><br><br>

        <div class="editor-container">
            <label>Content:</label>
            <textarea id="content" name="entry.421337030"></textarea><br><br>
        </div>

        <label>Image URL:</label>
        <input type="url" id="image" name="entry.377306596"><br><br>

        <label>Colour:</label>
        <input type="color" id="colour" value="#ffffff"><br><br>

        <label>External Link:</label>
        <input type="url" id="externalLink" name="entry.457303743"><br><br>

        <label>Custom Page:</label>
        <select id="customPage" name="entry.2143033031">
            <option value="false">False</option>
            <option value="true">True</option>
        </select><br><br>

        <label>Parent:</label>
        <select id="parent" name="entry.53127251">
            <option value="">Select Parent</option>
            <!-- Parent options will be populated dynamically -->
        </select><br><br>

        <!-- Hidden fields -->
        <input type="hidden" id="deleted" name="entry.1153953166">

        <button type="submit">Submit</button>
    </form>

    <script>
        // Initialize TinyMCE
        tinymce.init({
            selector: '#content',
            plugins: 'advlist autolink lists link image charmap preview anchor searchreplace visualblocks code fullscreen insertdatetime media table help',
            toolbar: 'undo redo | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image media table | code preview',
            height: 400,
            branding: false
        });

        // Generate a unique ID
        function generateId() {
            return 'ID-' + crypto.randomUUID();
        }

        // Set the ID initially
        document.getElementById('id').value = generateId();

        // Handle form submission
        document.getElementById('googleForm').addEventListener('submit', function (event) {
            event.preventDefault();

            // Get the form ID entered by the user
            const formId = document.getElementById('formId').value.trim();

            if (!formId) {
                alert("Please provide a valid Google Form ID.");
                return;
            }

            // Construct the form URL dynamically
            const formUrl = `https://docs.google.com/forms/d/e/${formId}/formResponse`;

            const formData = new FormData();
            formData.append("entry.1896761587", document.getElementById('id').value);
            formData.append("entry.1425210652", document.getElementById('title').value);
            formData.append("entry.1123697200", document.getElementById('subtitle').value);
            formData.append("entry.421337030", tinymce.get('content').getContent().trim());
            formData.append("entry.377306596", document.getElementById('image').value);
            formData.append("entry.235505769", document.getElementById('colour').value);
            formData.append("entry.457303743", document.getElementById('externalLink').value);
            formData.append("entry.1153953166", ""); // Empty "deleted" field
            formData.append("entry.2143033031", document.getElementById('customPage').value);
            formData.append("entry.53127251", document.getElementById('parent').value);

            // Send data via fetch API
            fetch(formUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                alert("Form submitted successfully!");
                // Reset the form but regenerate the ID
                document.getElementById('googleForm').reset();
                tinymce.get('content').setContent('');
                document.getElementById('id').value = generateId(); // Regenerate the ID
            }).catch(error => {
                alert("Error submitting form: " + error);
            });
        });
    </script>

</body>

</html>
