<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Items</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        select, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Manage Items</h2>

    <label for="itemSelect">Select an Item:</label>
    <select id="itemSelect">
        <option value="">Loading...</option>
    </select>
    
    <br>

    <button id="editBtn">Edit</button>
    <button id="deleteBtn" style="color: white; background-color: red;">Delete</button>

    <script>
        const googleSheetsUrl = "https://docs.google.com/spreadsheets/d/1XL-g0mTwrsdM1oTYs4rHNklgjrbSlB_fAJ7YgFGDJxg/gviz/tq?tqx=out:json";

        async function fetchData() {
            try {
                const response = await fetch(googleSheetsUrl);
                const text = await response.text();
                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1];
                const jsonData = JSON.parse(jsonText);

                processItems(jsonData);
            } catch (error) {
                console.error("Error fetching Google Sheets data:", error);
            }
        }

        function processItems(data) {
            const columns = data.table.cols.map(col => col.label);
            const idIndex = columns.indexOf("ID");
            const titleIndex = columns.indexOf("title");
            const deletedIndex = columns.indexOf("deleted");
            const timestampIndex = columns.indexOf("Informazioni cronologiche");

            const idMap = new Map();

            data.table.rows.forEach(row => {
                const cells = row.c;
                const id = cells[idIndex]?.v;
                const title = cells[titleIndex]?.v;
                const deleted = cells[deletedIndex]?.v === "true";
                const timestamp = cells[timestampIndex]?.f;

                if (!id || !title || deleted) return; // Ignore deleted items

                if (!idMap.has(id) || isNewer(timestamp, idMap.get(id).timestamp)) {
                    idMap.set(id, { title, timestamp });
                }
            });

            populateDropdown([...idMap.entries()]);
        }

        function isNewer(newTimestamp, oldTimestamp) {
            return parseTimestamp(newTimestamp) > parseTimestamp(oldTimestamp);
        }

        function parseTimestamp(timestamp) {
            if (!timestamp) return 0;
            const [date, time] = timestamp.split(" ");
            const [day, month, year] = date.split("/").map(Number);
            const [hours, minutes, seconds] = time.split(".").map(Number);
            return new Date(year, month - 1, day, hours, minutes, seconds).getTime();
        }

        function populateDropdown(idList) {
            const itemSelect = document.getElementById("itemSelect");
            itemSelect.innerHTML = '<option value="">Select an item</option>'; 

            idList.forEach(([id, { title }]) => {
                const option = document.createElement("option");
                option.value = id;
                option.textContent = title;
                itemSelect.appendChild(option);
            });
        }

        document.getElementById("deleteBtn").addEventListener("click", function () {
            const selectedId = document.getElementById("itemSelect").value;
            if (!selectedId) {
                alert("Please select an item to delete.");
                return;
            }

            if (!confirm("Are you sure you want to delete this item?")) {
                return;
            }

            submitDelete(selectedId);
        });

        function submitDelete(id) {
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSd1MdExT1814168haRWNrxUuPDe0jyMP1I9RPKMOyXonZDY2Q/formResponse";

            const formData = new FormData();
            formData.append("entry.1896761587", id);
            formData.append("entry.1153953166", "true"); // Mark as deleted

            fetch(formUrl, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            }).then(() => {
                alert("Item deleted successfully!");
                location.reload();
            }).catch(error => {
                alert("Error deleting item: " + error);
            });
        }

        document.getElementById("editBtn").addEventListener("click", function () {
            const selectedId = document.getElementById("itemSelect").value;
            if (!selectedId) {
                alert("Please select an item to edit.");
                return;
            }

            alert("Edit logic to be implemented for ID: " + selectedId);
        });

        document.addEventListener("DOMContentLoaded", fetchData);
    </script>

</body>
</html>
