<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pages manager</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <h1>Pages manager</h1>

    <table id="pagesTable">
        <thead>
            <tr>
                <!-- Dynamic headers will be inserted here -->
            </tr>
        </thead>
        <tbody>
            <!-- Dynamic rows will be inserted here -->
        </tbody>
    </table>

    <div class="form-container">
        <label for="deletionFormId">Google Form ID:</label>
        <input type="text" id="deletionFormId" placeholder="Enter Google Form ID" />
        <button id="deleteBtn">Delete Page</button>
        <button id="editBtn">Edit Page</button>
    </div>

    <script type="module" src="/js/manage/main.js"></script>
</body>
</html>
