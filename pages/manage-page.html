<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore pagine</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <h1>Gestore pagine</h1>

    <!-- Dropdown for selecting a page -->
    <div class="dropdown-container">
        <label for="pagesDropdown">Seleziona una pagina:</label>
        <select id="pagesDropdown">
            <!-- Dynamic options will be inserted here -->
        </select>
    </div>

    <div class="form-container">
        <label for="deletionFormId">Google Form ID:</label>
        <input type="text" id="deletionFormId" placeholder="Enter Google Form ID" />
        <button id="deleteBtn">Elimina pagina</button>
        <button id="editBtn">Modifica pagina</button>
    </div>

    <footer id="sticky-footer">
        <button id="back-button">Indietro</button>
    </footer>

    <script src="/main.js"></script>
    <script type="module" src="/js/manage-page.js"></script>
</body>
</html>
